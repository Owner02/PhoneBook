<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Телефонный справочник организации</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📞 Телефонный справочник организации</h1>
        </header>

        <!-- Панель поиска и кнопка добавления -->
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по всем полям..." class="search-input">
            <button id="addNewBtn" class="btn btn-primary">➕ Новый контакт</button>
        </div>

        <!-- Форма добавления / редактирования -->
        <div id="contactForm" class="contact-form hidden">
            <h2 id="formTitle">Добавить контакт</h2>
            <div class="form-grid">
                <div class="form-field">
                    <label for="fullName">ФИО *</label>
                    <input type="text" id="fullName" placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-field">
                    <label for="position">Должность</label>
                    <input type="text" id="position" placeholder="Начальник отдела">
                </div>
                <div class="form-field">
                    <label for="department">Отдел</label>
                    <input type="text" id="department" placeholder="IT">
                </div>
                <div class="form-field">
                    <label for="workPhone">Рабочий телефон</label>
                    <input type="tel" id="workPhone" placeholder="+7 (123) 456-78-90">
                </div>
                <div class="form-field">
                    <label for="mobilePhone">Мобильный телефон</label>
                    <input type="tel" id="mobilePhone" placeholder="+7 (987) 654-32-10">
                </div>
                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ivanov@company.ru">
                </div>
            </div>
            <div class="form-actions">
                <button id="saveContactBtn" class="btn btn-success">💾 Сохранить</button>
                <button id="cancelFormBtn" class="btn btn-secondary">Отмена</button>
            </div>
            <div id="formError" class="error-message"></div>
        </div>

        <!-- Таблица контактов -->
        <div class="table-wrapper">
            <table id="contactsTable">
                <thead>
                    <tr>
                        <th>ФИО</th><th>Должность</th><th>Отдел</th><th>Рабочий тел.</th><th>Мобильный тел.</th><th>Email</th><th>Действия</th>
                    </tr>
                </thead>
                <tbody id="contactsBody">
                    <tr><td colspan="7" style="text-align:center">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
